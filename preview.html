<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Preview dan download CV profesional Anda — CV Maker AI">
  <title>Preview CV — CV Maker AI</title>
  <link rel="icon" href="img/cv.png" type="image/png">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/preview.css">
</head>
<body>
  <div class="bg-mesh"></div>

  <!-- Navbar -->
  <nav class="navbar-modern" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <span class="brand-icon">📝</span> CV Maker AI
      </a>
      <ul class="navbar-links" id="navLinks">
        <li><a href="index.html">Beranda</a></li>
        <li><a href="about.html">Tentang</a></li>
        <li id="navDashboard" class="hidden"><a href="dashboard.html">Dashboard</a></li>
        <li id="navEditor" class="hidden"><a href="editor.html">Buat CV</a></li>
      </ul>
      <div class="navbar-actions" id="navActions">
        <div id="guestActions">
          <a href="login.html" class="btn-ghost btn-sm">Masuk</a>
          <a href="register.html" class="btn-gradient btn-sm">Daftar</a>
        </div>
        <div id="authActions" class="hidden">
          <div class="navbar-user">
            <span class="navbar-username" id="navUsername"></span>
            <button class="btn-ghost btn-sm" onclick="handleLogout()">Keluar</button>
          </div>
        </div>
      </div>
      <button class="navbar-toggle" id="navToggle" onclick="toggleMobileMenu()">☰</button>
    </div>
  </nav>

  <div class="preview-page">
    <!-- Toolbar -->
    <div class="preview-toolbar container-app">
      <div class="toolbar-left">
        <a href="#" id="editLink">← Kembali ke Editor</a>
      </div>
      <div class="toolbar-templates">
        <button class="tpl-btn active" data-template="modern">Modern</button>
        <button class="tpl-btn" data-template="classic">Classic</button>
        <button class="tpl-btn" data-template="minimal">Minimal</button>
        <button class="tpl-btn" data-template="elegant">Elegant</button>
        <button class="tpl-btn" data-template="creative">Creative</button>
        <button class="tpl-btn" data-template="professional">Professional</button>
      </div>
      <div class="toolbar-right">
        <button class="btn-ai" id="aiReviewBtn" onclick="aiReviewCV()">✨ AI Review</button>
        <button class="btn-ghost btn-sm" onclick="saveAsImage()">🖼 Gambar</button>
        <button class="btn-gradient btn-sm" onclick="saveAsPDF()">📄 PDF</button>
      </div>
    </div>

    <!-- CV Document -->
    <div class="preview-container">
      <div class="cv-document" id="cvDocument">
        <div style="padding:60px;text-align:center;color:#999;">Memuat CV...</div>
      </div>
    </div>
  </div>

  <!-- AI Review Panel -->
  <div class="ai-review-panel" id="aiReviewPanel">
    <div class="panel-header">
      <h3>📊 AI Review</h3>
      <button class="panel-close" onclick="closeReviewPanel()">×</button>
    </div>

    <div style="text-align:center;margin-bottom:var(--space-xl);">
      <div class="review-score-circle" id="reviewScore">—</div>
      <p class="text-muted" style="font-size:0.85rem;">Skor CV Anda</p>
    </div>

    <div class="review-section">
      <h4 style="color:var(--success);">💪 Kelebihan</h4>
      <ul id="reviewStrengths"><li class="text-muted">Klik "AI Review" untuk mulai</li></ul>
    </div>

    <div class="divider"></div>

    <div class="review-section">
      <h4 style="color:var(--warning);">💡 Saran Perbaikan</h4>
      <ul id="reviewImprovements"><li class="text-muted">Klik "AI Review" untuk mulai</li></ul>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/deepseek.js"></script>
  <script src="js/preview.js"></script>
</body>
</html>
